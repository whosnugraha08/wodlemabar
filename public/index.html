<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle Friends 🌿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#c8e6f5;--sky2:#b0d8ef;
  --cream:#fdf9f0;--cream2:#f5edd8;--panel:#fffef7;
  --green:#4a9b5a;--green-l:#e6f5ea;
  --yellow:#d4900a;--yellow-l:#fdf0c8;
  --absent:#b8a898;--absent-l:#ede6de;
  --red:#c0392b;--brown:#7a5c3a;--brown2:#9b7550;
  --text:#2c1f0e;--dim:#8a7060;--border:#d8c8b0;
  --shadow:rgba(120,80,40,.12);
  --font:'Nunito',system-ui,sans-serif;
  --kalam:'Kalam',cursive;
}
html,body{height:100%;background:var(--sky);color:var(--text);font-family:var(--font);overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--cream2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(7px)}45%{transform:translateX(-5px)}60%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes tilePress{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes tileFlip{0%{transform:rotateX(0)}49%{transform:rotateX(-90deg)}50%{transform:rotateX(-90deg)}100%{transform:rotateX(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-14px)}60%{transform:translateY(-6px)}}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
@keyframes slideInUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scaleIn{from{transform:scale(.88) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(74,155,90,.5)}70%{box-shadow:0 0 0 9px rgba(74,155,90,0)}100%{box-shadow:0 0 0 0 rgba(74,155,90,0)}}
@keyframes invitePop{0%{transform:scale(0.7) translateX(50px);opacity:0}70%{transform:scale(1.03) translateX(-3px)}100%{transform:scale(1) translateX(0);opacity:1}}

.screen{position:fixed;inset:0;display:none;flex-direction:column}
.screen.on{display:flex}

/* LOADING */
#s-load{align-items:center;justify-content:center;background:linear-gradient(160deg,#c8e6f5 0%,#d4f0c8 60%,#f5edd8 100%)}
.load-tree{font-size:60px;animation:wiggle 2s ease infinite;margin-bottom:12px}
.load-title{font-family:var(--kalam);font-size:30px;color:var(--brown);margin-bottom:8px}
.load-msg{font-size:14px;color:var(--dim);animation:pulse 1.6s ease infinite;margin-bottom:18px}
.load-dots{display:flex;gap:7px;justify-content:center}
.load-dots span{width:9px;height:9px;border-radius:50%;animation:dotBounce 1.2s ease infinite}
.load-dots span:nth-child(1){background:var(--green)}
.load-dots span:nth-child(2){background:var(--yellow);animation-delay:.15s}
.load-dots span:nth-child(3){background:var(--brown);animation-delay:.3s}

/* WELCOME */
#s-welcome{align-items:center;justify-content:center;overflow-y:auto;padding:20px;background:linear-gradient(160deg,#c8e6f5 0%,#d4f0c8 50%,#f5edd8 100%)}
.wc{width:100%;max-width:420px;animation:slideUp .4s ease}
.wlogo{text-align:center;margin-bottom:22px}
.wlogo-em{font-size:54px;display:block;margin-bottom:6px;animation:wiggle 3s ease infinite}
.wlogo-t{font-family:var(--kalam);font-size:36px;color:var(--brown);line-height:1.1}
.wlogo-s{color:var(--dim);font-size:14px;margin-top:4px}
.wcard{background:var(--panel);border:2px solid var(--border);border-radius:20px;padding:22px;margin-bottom:14px;box-shadow:0 4px 20px var(--shadow),0 1px 0 rgba(255,255,255,.9) inset}
.wlabel{font-size:12px;font-weight:800;color:var(--brown2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.avs{display:flex;flex-wrap:wrap;gap:6px}
.av{width:38px;height:38px;border-radius:10px;border:2px solid var(--border);background:var(--cream);cursor:pointer;font-size:19px;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none;box-shadow:0 2px 4px var(--shadow)}
.av:hover{transform:scale(1.1);border-color:var(--brown2)}
.av.on{border-color:var(--green);background:var(--green-l);transform:scale(1.12);box-shadow:0 3px 10px rgba(74,155,90,.3)}
.name-row{display:flex;gap:10px;align-items:center;margin-top:14px}
.name-av{font-size:30px;width:44px;text-align:center}
.name-in{flex:1;background:var(--cream);border:2px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:var(--font);font-size:16px;font-weight:700;outline:none;transition:border .2s,box-shadow .2s;box-shadow:0 2px 6px var(--shadow) inset}
.name-in:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(74,155,90,.15)}
.name-in::placeholder{color:var(--absent)}
.online-bar{display:flex;align-items:center;gap:8px;background:rgba(74,155,90,.1);border:1.5px solid rgba(74,155,90,.3);border-radius:12px;padding:8px 14px;margin-bottom:12px;font-size:13px;color:var(--green);font-weight:700}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:ping 1.5s ease infinite}
.btn-join{width:100%;padding:14px;background:linear-gradient(135deg,var(--green),#2d7a40);color:#fff;border:none;border-radius:14px;font-family:var(--font);font-size:17px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 5px 20px rgba(74,155,90,.4),0 1px 0 rgba(255,255,255,.2) inset}
.btn-join:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(74,155,90,.5)}
.btn-join:active{transform:translateY(0)}
.btn-join:disabled{background:var(--border);color:var(--absent);box-shadow:none;cursor:not-allowed;transform:none}

/* GAME */
#s-game{background:var(--sky)}
.hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px;background:var(--cream);border-bottom:2px solid var(--border);box-shadow:0 2px 8px var(--shadow);z-index:20}
.hdr-logo{display:flex;align-items:center;gap:7px;font-family:var(--kalam);font-size:20px;color:var(--brown)}
.hdr-logo .em{font-size:22px}
.hdr-mid{display:flex;align-items:center;gap:8px}
.day-pill{background:var(--cream2);border:1.5px solid var(--border);border-radius:20px;padding:3px 11px;font-size:12px;color:var(--dim);font-weight:700}
.conn-pill{display:flex;align-items:center;gap:5px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;transition:all .3s}
.conn-pill.ok{background:rgba(74,155,90,.12);border:1.5px solid rgba(74,155,90,.35);color:var(--green)}
.conn-pill.off{background:rgba(192,57,43,.1);border:1.5px solid rgba(192,57,43,.3);color:var(--red)}
.conn-dot{width:6px;height:6px;border-radius:50%}
.conn-pill.ok .conn-dot{background:var(--green)}.conn-pill.off .conn-dot{background:var(--red)}
.hdr-me{display:flex;align-items:center;gap:6px;background:var(--yellow-l);border:1.5px solid rgba(212,144,10,.3);border-radius:20px;padding:3px 12px}
.hdr-me .mn{font-size:13px;font-weight:800;color:var(--brown)}
.body{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
.sb{width:188px;flex-shrink:0;border-right:2px solid var(--border);padding:12px 9px;overflow-y:auto;background:var(--cream2)}
.sb-hd{font-size:11px;font-weight:900;color:var(--dim);text-transform:uppercase;letter-spacing:1px;padding:0 3px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sb-count{background:var(--border);border-radius:10px;padding:1px 7px;font-size:11px;color:var(--brown2)}
.mc{background:var(--panel);border:1.5px solid var(--border);border-radius:12px;padding:9px 10px;margin-bottom:7px;transition:border .2s,transform .2s,box-shadow .2s;animation:fadeIn .3s ease;box-shadow:0 2px 6px var(--shadow)}
.mc.me{background:var(--green-l);border-color:rgba(74,155,90,.4)}
.mc:hover{transform:translateX(2px);box-shadow:0 3px 10px var(--shadow)}
.mc-top{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.mc-av{font-size:17px;line-height:1}
.mc-info{flex:1;min-width:0}
.mc-name{font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc.me .mc-name{color:var(--green)}
.mc-st{font-size:10px;font-weight:700;color:var(--dim)}
.mc-st.won{color:var(--green)}.mc-st.lost{color:var(--red)}.mc-st.play{color:var(--yellow)}
.mb{display:grid;grid-template-columns:repeat(5,1fr);gap:2px}
.mi{aspect-ratio:1;border-radius:2px;background:var(--cream2);border:1px solid var(--border)}
.mi.c{background:var(--green);border-color:transparent}.mi.p{background:#d4900a;border-color:transparent}.mi.a{background:var(--absent);border-color:transparent}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 10px 8px;gap:11px;overflow-y:auto;overflow-x:hidden}
.guide{background:var(--panel);border:1.5px solid var(--border);border-radius:12px;padding:7px 16px;font-size:12px;color:var(--dim);text-align:center;width:100%;max-width:340px;font-weight:700;box-shadow:0 2px 6px var(--shadow)}
.guide strong{color:var(--brown2)}

/* BOARD */
.board{display:flex;flex-direction:column;gap:5px}
.brow{display:flex;gap:5px}
.brow.shake{animation:shake .5s ease}
.tile{width:54px;height:54px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--kalam);font-weight:700;font-size:24px;border:2px solid var(--border);background:var(--cream);color:var(--text);user-select:none;transition:border .1s;box-shadow:0 2px 5px var(--shadow)}
.tile.filled{background:var(--cream2);border-color:var(--brown2);animation:tilePress .12s ease;box-shadow:0 3px 8px var(--shadow)}
.tile.correct{background:var(--green);border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(74,155,90,.4)}
.tile.present{background:#d4900a;border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(212,144,10,.35)}
.tile.absent{background:var(--absent);border-color:transparent;color:#fff;box-shadow:none}
.tile.flipping{animation:tileFlip .45s ease var(--d,0s) both}
.tile.win-bounce{animation:bounce .6s ease var(--d,0s) both}

/* END WAIT */
.end-wait-msg{display:none;background:var(--panel);border:2px solid var(--border);border-radius:16px;padding:16px 22px;text-align:center;animation:slideDown .3s ease;width:100%;max-width:320px;box-shadow:0 6px 24px var(--shadow)}
.end-wait-msg.won{background:var(--green-l);border-color:rgba(74,155,90,.5)}
.end-wait-msg.lost{background:#fdf0ee;border-color:rgba(192,57,43,.3)}
.ewm-em{font-size:30px;margin-bottom:5px}
.ewm-t{font-family:var(--kalam);font-size:20px;color:var(--brown);margin-bottom:3px}
.ewm-w{color:var(--dim);font-size:13px;font-weight:700}
.ewm-w strong{color:var(--text);letter-spacing:2px}
.ewm-waiting{font-size:12px;color:var(--yellow);font-weight:700;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px}
.ew-dots{display:flex;gap:3px}
.ew-dots span{width:5px;height:5px;border-radius:50%;background:var(--yellow);animation:dotBounce 1.2s ease infinite}
.ew-dots span:nth-child(2){animation-delay:.15s}.ew-dots span:nth-child(3){animation-delay:.3s}

/* KEYBOARD */
.kbd{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;padding:0 4px 6px}
.krow{display:flex;gap:4px}
.key{min-width:34px;height:50px;border-radius:9px;background:var(--cream2);color:var(--text);border:1.5px solid var(--border);font-family:var(--font);font-weight:800;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 3px;transition:background .2s,transform .08s,border .2s;box-shadow:0 2px 5px var(--shadow),0 1px 0 rgba(255,255,255,.8) inset;user-select:none}
.key.wide{min-width:52px;font-size:11px;letter-spacing:.3px}
.key.correct{background:var(--green);border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(74,155,90,.3)}
.key.present{background:#d4900a;border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(212,144,10,.3)}
.key.absent{background:var(--absent-l);border-color:var(--border);color:var(--absent)}
.key:active{transform:scale(.91)}

/* TOAST */
#toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);padding:9px 22px;border-radius:12px;font-weight:800;font-size:14px;z-index:9999;display:none;box-shadow:0 6px 24px var(--shadow);max-width:290px;text-align:center;white-space:nowrap;animation:slideDown .25s ease;border:2px solid transparent}
#toast.err{background:#fdf0ee;color:var(--red);border-color:rgba(192,57,43,.3)}
#toast.ok{background:var(--green-l);color:var(--green);border-color:rgba(74,155,90,.3)}
#toast.warn{background:var(--yellow-l);color:var(--yellow);border-color:rgba(212,144,10,.3)}
#toast.info{background:var(--cream2);color:var(--brown);border-color:var(--border)}

/* CONFETTI (win only, lightweight) */
#cfc{position:fixed;inset:0;pointer-events:none;z-index:9000;overflow:hidden}
.cf{position:absolute;top:-20px;animation:fall linear both;opacity:.9}

/* OUTRO */
#outro{position:fixed;inset:0;z-index:500;display:none;align-items:flex-end;justify-content:center;background:rgba(44,31,14,.55);backdrop-filter:blur(5px)}
#outro.on{display:flex}
.outro-box{width:100%;max-width:500px;background:var(--cream);border:2px solid var(--border);border-top-left-radius:24px;border-top-right-radius:24px;padding-bottom:20px;animation:slideInUp .5s cubic-bezier(.22,1,.36,1);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px var(--shadow)}
.outro-head{padding:20px 22px 14px;border-bottom:2px solid var(--border);text-align:center;flex-shrink:0}
.outro-title{font-family:var(--kalam);font-size:28px;color:var(--brown);margin-bottom:4px}
.outro-sub{font-size:13px;color:var(--dim);font-weight:700}
.outro-word{display:inline-block;background:var(--yellow-l);border:1.5px solid rgba(212,144,10,.4);border-radius:10px;padding:4px 16px;font-family:var(--kalam);font-size:18px;letter-spacing:3px;color:var(--brown);margin-top:8px;box-shadow:0 2px 8px rgba(212,144,10,.2)}
.outro-list{padding:12px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;flex:1}
.outro-row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;animation:scaleIn .3s ease var(--d,0s) both;box-shadow:0 2px 8px var(--shadow)}
.outro-row.first{background:var(--yellow-l);border-color:rgba(212,144,10,.5)}
.outro-rank{font-size:22px;width:28px;text-align:center}
.outro-av{font-size:22px}
.outro-info{flex:1;min-width:0}
.outro-name{font-size:15px;font-weight:800;color:var(--text)}
.outro-result{font-size:12px;color:var(--dim);font-weight:700;margin-top:1px}
.outro-result.won{color:var(--green)}.outro-result.lost{color:var(--red)}
.outro-mini{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;width:55px;flex-shrink:0}
.om{width:9px;height:9px;border-radius:2px;background:var(--cream2);border:1px solid var(--border)}
.om.c{background:var(--green);border-color:transparent}.om.p{background:#d4900a;border-color:transparent}.om.a{background:var(--absent);border-color:transparent}
.outro-footer{padding:0 16px;margin-top:4px;flex-shrink:0}
.btn-again{width:100%;padding:13px;background:linear-gradient(135deg,var(--green),#2d7a40);color:#fff;border:none;border-radius:14px;font-family:var(--font);font-weight:800;font-size:16px;cursor:pointer;transition:all .2s;box-shadow:0 5px 20px rgba(74,155,90,.4),0 1px 0 rgba(255,255,255,.2) inset}
.btn-again:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(74,155,90,.5)}

/* INVITE BANNER */
#invite-banner{position:fixed;bottom:0;left:0;right:0;z-index:600;display:flex;justify-content:center;padding:0 16px 20px;pointer-events:none}
.invite-card{background:var(--panel);border:2px solid rgba(74,155,90,.5);border-radius:18px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 32px rgba(44,31,14,.25);pointer-events:all;animation:invitePop .4s cubic-bezier(.22,1,.36,1);max-width:420px;width:100%}
.invite-card .i-em{font-size:28px}
.invite-card .i-text{flex:1}
.invite-card .i-title{font-weight:800;font-size:15px;color:var(--text)}
.invite-card .i-sub{font-size:12px;color:var(--dim);font-weight:700;margin-top:2px}
.invite-card .i-actions{display:flex;gap:8px}
.btn-accept{padding:8px 16px;background:linear-gradient(135deg,var(--green),#2d7a40);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-weight:800;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:0 3px 10px rgba(74,155,90,.35)}
.btn-accept:hover{transform:translateY(-1px)}
.btn-decline{padding:8px 12px;background:var(--cream2);border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;color:var(--dim);transition:all .2s}
.btn-decline:hover{color:var(--text)}

@media(max-width:480px){.sb{width:148px}.tile{width:46px;height:46px;font-size:20px}.key{min-width:27px;height:44px;font-size:12px}.key.wide{min-width:44px}}
@media(max-width:360px){.sb{display:none}}
</style>
</head>
<body>

<div id="s-load" class="screen on">
  <div class="load-tree">🌿</div>
  <div class="load-title">Wordle Friends</div>
  <div class="load-msg" id="load-msg">Menghubungkan ke server...</div>
  <div class="load-dots"><span></span><span></span><span></span></div>
</div>

<div id="s-welcome" class="screen">
  <div class="wc">
    <div class="wlogo">
      <span class="wlogo-em">🌿</span>
      <div class="wlogo-t">Wordle Friends</div>
      <div class="wlogo-s">Tebak kata bareng temen-temen!</div>
    </div>
    <div class="online-bar"><div class="online-dot"></div><span id="online-count">Menghubungkan...</span></div>
    <div class="wcard">
      <div class="wlabel">Pilih avatar kamu</div>
      <div class="avs" id="avs"></div>
      <div class="name-row">
        <div class="name-av" id="nav">🐱</div>
        <input class="name-in" id="nin" type="text" maxlength="16" placeholder="Nama kamu...">
      </div>
    </div>
    <button class="btn-join" id="bjoin" disabled onclick="joinGame()">Mulai Nebak! 🚀</button>
  </div>
</div>

<div id="s-game" class="screen">
  <div class="hdr">
    <div class="hdr-logo"><span class="em">🌿</span>Wordle Friends</div>
    <div class="hdr-mid">
      <div class="day-pill" id="day-pill">#1</div>
      <div class="conn-pill ok" id="conn-pill"><div class="conn-dot"></div><span id="conn-label">Live</span></div>
    </div>
    <div class="hdr-me"><span id="hdr-av">🐱</span><span class="mn" id="hdr-name">Aku</span></div>
  </div>
  <div class="body">
    <div class="sb" id="sidebar">
      <div class="sb-hd">👥 Pemain <span class="sb-count" id="sb-count">0</span></div>
      <div id="players-list"></div>
    </div>
    <div class="main">
      <div class="guide"><strong>🟩</strong> Tepat &nbsp;·&nbsp; <strong>🟨</strong> Ada, salah posisi &nbsp;·&nbsp; <strong>⬛</strong> Gak ada</div>
      <div class="board" id="board"></div>
      <div class="end-wait-msg" id="ewm">
        <div class="ewm-em" id="ewm-em">🎉</div>
        <div class="ewm-t" id="ewm-t">Mantap!</div>
        <div class="ewm-w" id="ewm-w">Jawaban: <strong id="ewm-ans">?</strong></div>
        <div class="ewm-waiting">⏳ Nunggu yang lain<div class="ew-dots"><span></span><span></span><span></span></div></div>
      </div>
      <div class="kbd" id="kbd"></div>
    </div>
  </div>
</div>

<div id="outro">
  <div class="outro-box">
    <div class="outro-head">
      <div class="outro-title" id="outro-title">🏆 Hasil Ronde!</div>
      <div class="outro-sub">Kata hari ini:</div>
      <div class="outro-word" id="outro-word">?????</div>
    </div>
    <div class="outro-list" id="outro-list"></div>
    <div class="outro-footer"><button class="btn-again" onclick="startPlayAgain()">🔄 Main Lagi!</button></div>
  </div>
</div>

<div id="invite-banner" style="display:none"></div>
<div id="toast"></div>
<div id="cfc"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const AVATARS=['🐱','🐶','🐻','🦊','🐼','🐨','🐯','🦁','🐸','🐙','🦄','🐝','🦋','🦖','🦕','🐲','🤖','👾','🧙','🧛','🧟','🎃','🌈','⚡','🔥','💎','🎮','🎯','🚀','🌸'];
const KROWS=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','⌫']];
const PRIO={correct:2,present:1,absent:0};
const MEDALS=['🥇','🥈','🥉'];

let myName='',myAvatar='🐱',socket=null;
let myGuesses=[],keyStates={};
let curRow=0,curCol=0,gameOver=false;
let players={};
let pendingInviteId=null;

function $(id){return document.getElementById(id)}

// ─── WEB AUDIO SFX ───
let actx=null;
function ac(){
  if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended')actx.resume();
  return actx;
}
function note(freq,type='sine',dur=0.08,vol=0.18,delay=0){
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;o.frequency.value=freq;
    const t=c.currentTime+delay;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+0.01);
  }catch(e){}
}
const SFX={
  key(){note(440,'triangle',0.06,0.1)},
  del(){note(320,'triangle',0.06,0.07)},
  bad(){note(220,'sawtooth',0.08,0.1);note(200,'sawtooth',0.08,0.1,.06)},
  reveal(s,d=0){
    const f={correct:660,present:510,absent:280};
    const t={correct:'sine',present:'triangle',absent:'square'};
    const v={correct:0.18,present:0.14,absent:0.07};
    note(f[s]||280,t[s]||'sine',0.14,v[s]||0.1,d);
  },
  win(){[523,659,784,1047].forEach((f,i)=>note(f,'sine',0.2,0.18,i*.1));setTimeout(()=>note(1047,'sine',0.5,0.14),500)},
  lose(){note(392,'triangle',.15,.14);setTimeout(()=>note(349,'triangle',.15,.14),150);setTimeout(()=>note(294,'triangle',.25,.18),300)},
  join(){note(660,'sine',.12,.12);note(880,'sine',.12,.1,.1)},
  invite(){note(784,'sine',.1,.13);note(659,'sine',.1,.11,.12);note(784,'sine',.15,.13,.24)}
};

// ─── SOCKET ───
function connectSocket(){
  socket=io({transports:['websocket','polling']});
  socket.on('connect',()=>{setConn(true);$('load-msg').textContent='Terhubung! 🌿';setTimeout(()=>showScreen('s-welcome'),400)});
  socket.on('disconnect',()=>{setConn(false);toast('Koneksi terputus 🔌','err',4000)});
  socket.on('connect_error',()=>{$('load-msg').textContent='Gagal konek ke server 😢'});
  socket.on('room_state',onRoomState);
  socket.on('player_joined',onPlayerJoined);
  socket.on('player_left',onPlayerLeft);
  socket.on('player_update',onPlayerUpdate);
  socket.on('guess_result',onGuessResult);
  socket.on('guess_error',onGuessError);
  socket.on('room_finished',onRoomFinished);
  socket.on('round_invite',onRoundInvite);
  socket.on('round_joined',onRoundJoined);
}
function setConn(ok){const p=$('conn-pill');if(!p)return;p.className='conn-pill '+(ok?'ok':'off');$('conn-label').textContent=ok?'Live':'Offline'}

// ─── WELCOME ───
function initWelcome(){
  const grid=$('avs');
  AVATARS.forEach(a=>{
    const b=document.createElement('button');b.className='av';b.textContent=a;
    b.onclick=()=>{grid.querySelectorAll('.av').forEach(x=>x.classList.remove('on'));b.classList.add('on');myAvatar=a;$('nav').textContent=a;checkJoin()};
    grid.appendChild(b);
  });
  grid.children[0].click();
  $('nin').addEventListener('input',checkJoin);
  $('nin').addEventListener('keydown',e=>{if(e.key==='Enter')joinGame()});
}
function checkJoin(){$('bjoin').disabled=!$('nin').value.trim()}
function joinGame(){
  myName=$('nin').value.trim().slice(0,16);
  if(!myName||!socket?.connected)return;
  $('hdr-av').textContent=myAvatar;$('hdr-name').textContent=myName;
  showScreen('s-game');buildBoard();buildKbd();
  socket.emit('join',{name:myName,avatar:myAvatar,roomId:'daily'});
  SFX.join();
}

// ─── SERVER EVENTS ───
function onRoomState(data){
  players={};data.players.forEach(p=>{players[p.id]=p});
  if(data.dayNumber)$('day-pill').textContent='#'+data.dayNumber;
  renderPlayers();updateOnlineCount();
}
function onPlayerJoined(p){
  players[p.id]=p;renderPlayers();updateOnlineCount();
  if(p.id!==socket.id){toast(`${p.avatar} ${p.name} join! 👋`,'info',2000);SFX.join()}
}
function onPlayerLeft(data){
  const p=players[data.id];
  toast(`${data.avatar||p?.avatar||'👤'} ${data.name||p?.name||'Seseorang'} keluar 👋`,'info',2000);
  delete players[data.id];
  renderPlayers();updateOnlineCount();
  if($('outro').classList.contains('on')){const row=$('outro-list').querySelector(`[data-pid="${data.id}"]`);if(row)row.remove()}
}
function onPlayerUpdate(p){players[p.id]=p;renderPlayers()}

function onGuessResult(data){
  const{word,result,status,answer}=data;
  for(let c=0;c<5;c++){
    const t=getTile(curRow,c),s=result[c],d=c*.1;
    t.style.setProperty('--d',d+'s');t.classList.add('flipping');
    SFX.reveal(s,d+0.15);
    setTimeout(()=>{t.className='tile '+s},c*100+225);
    const l=word[c];if(!keyStates[l]||PRIO[s]>PRIO[keyStates[l]])keyStates[l]=s;
  }
  setTimeout(()=>{
    updateKbd();myGuesses.push({word,result});
    if(status==='won'){winBounce(curRow);setTimeout(()=>{SFX.win();showEndWait(true,answer)},600)}
    else if(status==='lost'){SFX.lose();setTimeout(()=>showEndWait(false,answer),400)}
    curRow++;curCol=0;
    gameOver=(status==='won'||status==='lost');
    if(gameOver)disableKbd();
    if(players[socket.id]){players[socket.id].guesses=myGuesses;players[socket.id].status=status||'playing'}
    renderPlayers();
  },5*100+300);
}
function onGuessError(data){shake();SFX.bad();toast(data.message||'Kata gak valid!','warn',2500)}
function onRoomFinished(data){
  if($('outro').classList.contains('on'))showOutro(data);
  else{const d=gameOver?1600:300;setTimeout(()=>showOutro(data),d)}
}

// ─── PLAY AGAIN INVITE ───
function onRoundInvite(data){
  pendingInviteId=data.roundId;SFX.invite();
  const b=$('invite-banner');b.style.display='flex';
  b.innerHTML=`<div class="invite-card">
    <div class="i-em">🌱</div>
    <div class="i-text">
      <div class="i-title">${esc(data.by.avatar)} ${esc(data.by.name)} ngajak main lagi!</div>
      <div class="i-sub">Mau ikut ronde baru?</div>
    </div>
    <div class="i-actions">
      <button class="btn-accept" onclick="acceptInvite('${data.roundId}')">Ikut! 🚀</button>
      <button class="btn-decline" onclick="hideInvite()">Gak ah</button>
    </div>
  </div>`;
  setTimeout(()=>hideInvite(),30000);
}
function hideInvite(){const b=$('invite-banner');b.style.display='none';b.innerHTML='';pendingInviteId=null}
function acceptInvite(id){socket.emit('join_round',{roundId:id});hideInvite()}

function onRoundJoined(data){
  myGuesses=[];keyStates={};curRow=0;curCol=0;gameOver=false;
  $('outro').classList.remove('on');hideInvite();
  $('ewm').style.display='none';$('ewm').className='end-wait-msg';
  buildBoard();buildKbd();
  data.players.forEach(p=>{players[p.id]=p});
  $('day-pill').textContent='🎲 Practice';
  renderPlayers();updateOnlineCount();
  toast('Ronde baru dimulai! 🌱','ok',2500);SFX.join();
}

// ─── BOARD ───
function buildBoard(){const b=$('board');b.innerHTML='';for(let r=0;r<6;r++){const row=document.createElement('div');row.className='brow';row.id='row-'+r;for(let c=0;c<5;c++){const t=document.createElement('div');t.className='tile';t.id=`t${r}${c}`;row.appendChild(t)}b.appendChild(row)}}
function getTile(r,c){return $(`t${r}${c}`)}

// ─── KEYBOARD ───
function buildKbd(){const kb=$('kbd');kb.innerHTML='';KROWS.forEach(row=>{const r=document.createElement('div');r.className='krow';row.forEach(k=>{const btn=document.createElement('button');btn.className='key'+(k.length>1?' wide':'');btn.textContent=k;btn.id='k-'+k;btn.addEventListener('click',()=>press(k));r.appendChild(btn)});kb.appendChild(r)})}
function updateKbd(){Object.entries(keyStates).forEach(([k,s])=>{const el=$('k-'+k);if(el)el.className='key'+(k.length>1?' wide':'')+' '+s})}
function disableKbd(){$('kbd').style.opacity='.45';$('kbd').style.pointerEvents='none'}

// ─── INPUT ───
document.addEventListener('keydown',e=>{
  if(!$('s-game').classList.contains('on'))return;
  if($('outro').classList.contains('on'))return;
  const k=e.key;
  if(k==='Enter')press('ENTER');
  else if(k==='Backspace')press('⌫');
  else if(/^[a-zA-Z]$/.test(k))press(k.toUpperCase());
});
function press(k){
  if(gameOver)return;
  if(k==='⌫'){if(curCol>0){curCol--;const t=getTile(curRow,curCol);t.textContent='';t.className='tile';SFX.del()}}
  else if(k==='ENTER'){if(curCol<5){shake();SFX.bad();toast('Kurang 5 huruf! 🌿','warn');return}socket.emit('guess',{word:getTyped()})}
  else if(/^[A-Z]$/.test(k)){if(curCol<5){const t=getTile(curRow,curCol);t.textContent=k;t.className='tile filled';curCol++;SFX.key()}}
}
function getTyped(){let w='';for(let c=0;c<5;c++)w+=getTile(curRow,c).textContent;return w}

// ─── ANIMATIONS ───
function shake(){const r=$('row-'+curRow);r.classList.add('shake');setTimeout(()=>r.classList.remove('shake'),600)}
function winBounce(row){for(let c=0;c<5;c++){const t=getTile(row,c);t.style.setProperty('--d',(c*.08)+'s');t.classList.add('win-bounce')}spawnConfetti()}

// ─── END WAIT ───
function showEndWait(won,answer){
  const ems=['🌟','🍀','🌸','🌻','🍃','🌾'];
  const msgs=['GENIUS! 1 tebakan!','Luar biasa! ✨','Bagus banget! 🌸','Nice! 🌻','Hampir aja! 🍃','Fiuh! Nyaris! 🌾'];
  const card=$('ewm');card.className='end-wait-msg '+(won?'won':'lost');
  $('ewm-em').textContent=won?ems[Math.min(myGuesses.length-1,5)]:'🍂';
  $('ewm-t').textContent=won?msgs[Math.min(myGuesses.length-1,5)]:'Aduh... 😔';
  $('ewm-ans').textContent=answer||'?????';card.style.display='block';
}

// ─── SIDEBAR ───
function renderPlayers(){
  const list=$('players-list');list.innerHTML='';
  const me=socket?.id;
  const sorted=Object.values(players).sort((a,b)=>{if(a.id===me)return -1;if(b.id===me)return 1;return 0});
  sorted.forEach(p=>{
    const isMe=p.id===me;const div=document.createElement('div');div.className='mc'+(isMe?' me':'');
    let stText='🎮 Main',stClass='play';
    if(p.status==='won'){stText=`✅ Menang ${p.guesses.length}/6`;stClass='won'}
    else if(p.status==='lost'){stText='❌ Kalah';stClass='lost'}
    else if(p.guesses?.length>0)stText=`🎮 ${p.guesses.length}/6`;
    div.innerHTML=`<div class="mc-top"><div class="mc-av">${p.avatar||'🐱'}</div><div class="mc-info"><div class="mc-name">${esc(p.name)}${isMe?' <span style="color:var(--dim);font-size:10px">(kamu)</span>':''}</div><div class="mc-st ${stClass}">${stText}</div></div></div><div class="mb" id="mb-${p.id}"></div>`;
    list.appendChild(div);
    const mb=div.querySelector('.mb');
    for(let r=0;r<6;r++)for(let c=0;c<5;c++){const cell=document.createElement('div');cell.className='mi';const g=p.guesses?.[r];if(g?.result){const s=g.result[c];if(s==='correct')cell.classList.add('c');else if(s==='present')cell.classList.add('p');else if(s==='absent')cell.classList.add('a')}mb.appendChild(cell)}
  });
}
function updateOnlineCount(){const n=Object.keys(players).length;$('sb-count').textContent=n;$('online-count').textContent=n>0?`${n} pemain online`:'Belum ada yang online'}

// ─── OUTRO ───
function showOutro(data){
  const{answer,players:ranked}=data;
  $('outro-word').textContent=answer;
  const w=ranked.filter(p=>p.status==='won');
  $('outro-title').textContent=w.length===ranked.length?'🎉 Semua Menang!':w.length===0?'🍂 Semua Kalah!':'🏆 Hasil Ronde!';
  const list=$('outro-list');list.innerHTML='';
  ranked.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='outro-row'+(i===0&&p.status==='won'?' first':'');
    div.style.setProperty('--d',(i*.07)+'s');div.dataset.pid=p.id;
    const rank=p.status==='won'?(MEDALS[i]||`#${i+1}`):'🍂';
    const result=p.status==='won'?`✅ Menang dalam ${p.guesses.length} tebakan`:'❌ Kalah';
    const rCls=p.status==='won'?'won':'lost';const isMe=p.id===socket?.id;
    let mini='<div class="outro-mini">';
    for(let r=0;r<6;r++)for(let c=0;c<5;c++){const g=p.guesses?.[r];const s=g?.result?.[c];const cl=s==='correct'?'c':s==='present'?'p':s==='absent'?'a':'';mini+=`<div class="om ${cl}"></div>`}
    mini+='</div>';
    div.innerHTML=`<div class="outro-rank">${rank}</div><div class="outro-av">${p.avatar||'🐱'}</div><div class="outro-info"><div class="outro-name">${esc(p.name)}${isMe?' (kamu)':''}</div><div class="outro-result ${rCls}">${result}</div></div>${mini}`;
    list.appendChild(div);
  });
  $('outro').classList.add('on');
  // NO confetti in outro — lightweight
}
function startPlayAgain(){socket.emit('play_again')}

// ─── CONFETTI (win only, 50 pieces) ───
const CFC=['#4a9b5a','#d4900a','#7a5c3a','#c8e6f5','#f5edd8','#2d7a40','#d4600a','#88c070'];
function spawnConfetti(){
  const c=$('cfc');c.innerHTML='';
  for(let i=0;i<50;i++){
    const el=document.createElement('div');el.className='cf';
    el.style.left=Math.random()*100+'vw';
    el.style.background=CFC[Math.floor(Math.random()*CFC.length)];
    const sz=Math.random()*7+4;el.style.width=sz+'px';el.style.height=sz+'px';
    el.style.borderRadius=Math.random()>.5?'50%':'3px';
    el.style.animationDuration=(Math.random()*2+1.5)+'s';
    el.style.animationDelay=Math.random()*.8+'s';
    c.appendChild(el);
  }
  setTimeout(()=>c.innerHTML='',4000);
}

// ─── TOAST + UTILS ───
let toastT=null;
function toast(msg,type='info',dur=2000){const t=$('toast');t.textContent=msg;t.className=type;t.style.display='block';clearTimeout(toastT);toastT=setTimeout(()=>t.style.display='none',dur)}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$(id).classList.add('on')}
function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ─── BOOT ───
initWelcome();
connectSocket();
</script>
</body>
</html>
